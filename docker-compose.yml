version: "3.9"

services:
  # ─────────────────────────────────────────
  # MongoDB Database
  # ─────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: financebot_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-secret123}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-financebot_db}
    ports:
      - "27117:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    networks:
      - financebot-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────
  # Redis (Cache untuk Evolution API v2)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: financebot_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secretredis123}
    ports:
      - "6480:6379"
    volumes:
      - redis_data:/data
    networks:
      - financebot-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secretredis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────
  # PostgreSQL (Database untuk Evolution API v2)
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: financebot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolutionpassword
      POSTGRES_DB: evolution
    ports:
      - "5533:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - financebot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: financebot_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URL=mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-secret123}@mongodb:27017/${MONGO_INITDB_DATABASE:-financebot_db}?authSource=admin
    ports:
      - "8100:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - financebot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────
  # Next.js Frontend
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: financebot_frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8100
    ports:
      - "3100:3000"
    depends_on:
      - backend
    networks:
      - financebot-network

  # ─────────────────────────────────────────
  # Evolution API (WhatsApp Gateway)
  # ─────────────────────────────────────────
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: financebot_evolution
    restart: unless-stopped

    ports:
      - "8182:8080"
    environment:
      - SERVER_URL=http://financebot_evolution:8080
      - CONFIG_SESSION_PHONE_CLIENT=Evolution
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1015901307
      - WEB_VERSION=2.3000.1015901307
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-changeme-secret-key}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolutionpassword@postgres:5432/evolution?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - WEBHOOK_GLOBAL_URL=http://backend:8000/webhook/whatsapp
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
      - CONFIG_SESSION_PHONE_CLIENT=FinanceBot UMKM
      - CONFIG_SESSION_PHONE_NAME=Chrome
      - QRCODE_LIMIT=30
      - LOG_LEVEL=ERROR
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://:${REDIS_PASSWORD:-secretredis123}@redis:6379/0
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=true
      - CACHE_LOCAL_ENABLED=false
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - financebot-network
# ─────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────
volumes:
  mongodb_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  evolution_instances:
    driver: local

# ─────────────────────────────────────────
# Networks
# ─────────────────────────────────────────
networks:
  financebot-network:
    driver: bridge
